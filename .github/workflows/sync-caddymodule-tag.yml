name: Sync caddymodule tag with root tag

# When a root tag (e.g. v0.7.2) is pushed, mirror it to a matching
# caddymodule/v0.7.2 tag whose go.mod pins the new core version. That
# way `xcaddy --with .../caddymodule@latest` always resolves to a
# caddymodule release that ships the latest core.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: caddymodule/go.sum

      - name: Bump caddymodule require to ${{ github.ref_name }}
        working-directory: caddymodule
        run: |
          go mod edit -require=github.com/VeloxCoding/scopecache@${GITHUB_REF_NAME}
          go mod tidy

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Commit go.mod / go.sum bump if changed
        run: |
          if ! git diff --quiet caddymodule/go.mod caddymodule/go.sum; then
            git add caddymodule/go.mod caddymodule/go.sum
            git commit -m "build(caddymodule): bump scopecache dep to ${GITHUB_REF_NAME}"
            git push origin main
          fi

      - name: Tag caddymodule/${{ github.ref_name }} and push
        run: |
          TAG="caddymodule/${GITHUB_REF_NAME}"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping"
            exit 0
          fi
          git tag "${TAG}"
          git push origin "${TAG}"
