name: Sync caddymodule tag with root tag

# Recovery-path workflow. The normal release flow lives in
# scripts/release.sh, which does the caddymodule bump + dual-tag
# atomically from the developer's machine. That script eliminated
# the previous "auto-trigger on push tag → bot lands a commit on
# origin → local main goes one commit behind → next push needs
# pull --rebase" friction loop.
#
# This workflow is therefore workflow_dispatch only: it fires only
# when an operator explicitly runs it from the Actions tab. Use
# it when:
#   - Someone (or some automation) pushed a root vX.Y.Z tag
#     without using scripts/release.sh and the caddymodule never
#     got bumped, leaving xcaddy --with @latest resolving to a
#     caddymodule that pins a stale core.
#   - The release script failed midway after pushing the root tag
#     but before pushing the caddymodule tag, and you want a
#     remote re-attempt instead of re-running the script locally.
#
# To trigger: Actions tab → "Sync caddymodule tag with root tag" →
# "Run workflow" → enter e.g. v0.8.2.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to sync (e.g. v0.8.2). Must already exist on the remote.'
        required: true
        type: string

permissions:
  contents: write

# Always sourced from the manual-dispatch input now that auto-run on
# push has been removed.
env:
  TAG_NAME: ${{ github.event.inputs.tag }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Validate TAG_NAME shape
        # Defensive guard — workflow_dispatch input is operator-typed and
        # could be anything. Also catches a future tag pattern that
        # doesn't match v*. The auto-trigger filter already enforces v*
        # but the env passes through both code paths.
        run: |
          case "${TAG_NAME}" in
            v*) echo "TAG_NAME=${TAG_NAME} (valid)" ;;
            *)  echo "TAG_NAME=${TAG_NAME} does not match v*; aborting"; exit 1 ;;
          esac

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: caddymodule/go.sum

      - name: Bump caddymodule require to ${{ env.TAG_NAME }}
        working-directory: caddymodule
        # `go mod tidy` fetches the new scopecache version from
        # proxy.golang.org. There is a known race between tag-push and
        # proxy-pickup (typically resolves within seconds, occasionally
        # up to a minute). Five retries with 20s back-off cover > 99% of
        # races; if the proxy is genuinely down or slow, the
        # GOPROXY=direct fallback skips the proxy entirely and resolves
        # the version straight from git.
        #
        # `go mod edit` is offline (no network); only `tidy` needs the
        # proxy reachable.
        run: |
          go mod edit -require=github.com/VeloxCoding/scopecache@${TAG_NAME}
          SUCCESS=0
          for i in 1 2 3 4 5; do
            if go mod tidy; then
              SUCCESS=1
              break
            fi
            echo "go mod tidy attempt $i failed; sleeping 20s before retry"
            sleep 20
          done
          if [ "$SUCCESS" != "1" ]; then
            echo "Proxy retries exhausted; falling back to GOPROXY=direct"
            GOPROXY=direct go mod tidy
          fi

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Commit go.mod / go.sum bump if changed
        run: |
          if ! git diff --quiet caddymodule/go.mod caddymodule/go.sum; then
            git add caddymodule/go.mod caddymodule/go.sum
            git commit -m "build(caddymodule): bump scopecache dep to ${TAG_NAME}"
            git push origin main
          fi

      - name: Tag caddymodule/${{ env.TAG_NAME }} and push
        run: |
          TAG="caddymodule/${TAG_NAME}"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping"
            exit 0
          fi
          git tag "${TAG}"
          git push origin "${TAG}"
