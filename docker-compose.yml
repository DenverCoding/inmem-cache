services:
  inmem-cache:
    build: .
    container_name: inmem-cache
    volumes:
      - inmem-sock:/run

  dev:
    image: golang:1.23-alpine
    container_name: inmem-cache-dev
    working_dir: /src
    volumes:
      - .:/src
      - go-cache:/go/pkg/mod
      - inmem-sock:/run
    command: ["sh", "-c", "apk add --no-cache curl && tail -f /dev/null"]
    stdin_open: true
    tty: true

volumes:
  go-cache:
  inmem-sock:
